name: 🔍 Automated Code Review

on:
  push:
    branches: [main, master, develop, "feature/**"]
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Code Style & Formatting (Black + isort)
  # ─────────────────────────────────────────────
  formatting:
    name: 🎨 Formatting Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Install formatters
        run: pip install black isort

      - name: Run Black via reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          black --check --diff . 2>&1 | reviewdog \
            -efm="%f:%l:%c: %m" \
            -name="Black Formatter" \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-on-error=false || true

      - name: Run isort check
        run: |
          isort --check-only --diff . && echo "✅ isort: All imports are sorted correctly" || echo "⚠️ isort: Import order issues found (see diff above)"

      - name: Log completion status
        run: echo "✅ Formatting check (Black + isort) done."

  # ─────────────────────────────────────────────
  # 2. Linting (Ruff - fast Python linter)
  # ─────────────────────────────────────────────
  lint:
    name: 🔎 Linting (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ruff via reviewdog
        uses: reviewdog/action-ruff@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added
          fail_on_error: false
          ruff_flags: "--select=E,W,F,I,N,UP,B,A,C4,SIM --ignore=E501"

      - name: Log completion status
        run: echo "✅ Linting (Ruff) done."

  # ─────────────────────────────────────────────
  # 3. Security Scan (Bandit)
  # ─────────────────────────────────────────────
  security:
    name: 🔒 Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit security scan via reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bandit -r . --skip B101 -f json 2>/dev/null \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for issue in data.get('results', []):
              filename = issue['filename']
              line = issue['line_number']
              severity = issue['issue_severity']
              text = issue['issue_text']
              test_id = issue['test_id']
              print(f'{filename}:{line}:1: [{severity}] {test_id}: {text}')
          " | reviewdog \
            -efm="%f:%l:%c: %m" \
            -name="Bandit Security" \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-on-error=false || true

      - name: Log completion status
        run: echo "✅ Security scan (Bandit) done."

  # ─────────────────────────────────────────────
  # 4. Custom Rules Enforcement
  # ─────────────────────────────────────────────
  custom-rules:
    name: 📋 Custom Rules Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run custom rule checks
        run: |
          python3 .github/scripts/custom_rules_check.py

      - name: Log completion status
        run: echo "✅ Custom rules check done."

  # ─────────────────────────────────────────────
  # 5. Summary Report on PR
  # ─────────────────────────────────────────────
  summary:
    name: 📊 Review Summary
    runs-on: ubuntu-latest
    needs: [formatting, lint, security, custom-rules]
    if: always()
    steps:
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              formatting: '${{ needs.formatting.result }}',
              lint: '${{ needs.lint.result }}',
              security: '${{ needs.security.result }}',
              custom_rules: '${{ needs.custom-rules.result }}'
            };

            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⚠️';

            const body = [
              "## 🤖 Automated Code Review Report",
              "",
              "| Check | Status |",
              "|-------|--------|",
              `| 🎨 Formatting (Black + isort) | ${icon(results.formatting)} ${results.formatting} |`,
              `| 🔎 Linting (Ruff) | ${icon(results.lint)} ${results.lint} |`,
              `| 🔒 Security (Bandit) | ${icon(results.security)} ${results.security} |`,
              `| 📋 Custom Rules | ${icon(results.custom_rules)} ${results.custom_rules} |`,
              "",
              "> 💡 Check the **Files changed** tab for inline review comments from each tool.",
              "> 🔍 Review inline annotations from **Reviewdog** for specific line-level feedback."
            ].join("\n");

            if (!context.issue.number) {
              console.log("Not running in a PR context (e.g. push event). Summary table:");
              console.log(body);
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Automated Code Review Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

