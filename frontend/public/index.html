<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc-Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <i class="fas fa-file-alt text-blue-400 text-3xl"></i>
            <h1 class="text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Doc-Manager</h1>
        </div>
        <div class="flex items-center space-x-4">
             <div class="relative">
                <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="user_id" placeholder="Enter User ID" class="pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-full focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm placeholder-gray-500" value="user123">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl flex flex-col md:flex-row gap-8">

        <!-- Left Column: Upload -->
        <section class="flex-1">
            <div class="glass-panel rounded-2xl p-6 h-full flex flex-col shadow-2xl transition-transform hover:-translate-y-1 duration-300">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <i class="fas fa-cloud-upload-alt mr-3 text-purple-400"></i>
                    Upload Document
                </h2>

                <form id="uploadForm" class="flex-grow flex flex-col justify-center">
                    <div class="relative border-2 border-dashed border-slate-600 rounded-xl p-8 text-center hover:border-blue-500 transition-colors bg-slate-800/50 group cursor-pointer" id="dropzone">
                        <input type="file" id="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" required>
                        <i class="fas fa-file-upload text-5xl text-slate-500 group-hover:text-blue-400 transition-colors mb-4"></i>
                        <p class="text-slate-300 font-medium mb-1" id="fileNameDisplay">Drag and drop or click to browse</p>
                        <p class="text-xs text-slate-500">PDFs, Docs, Txt files supported</p>
                    </div>

                    <button type="submit" class="mt-6 w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-xl font-semibold shadow-lg shadow-blue-500/30 transition-all transform hover:scale-[1.02] active:scale-[0.98] flex justify-center items-center">
                        <i class="fas fa-upload mr-2"></i> Upload File
                    </button>
                    <div id="uploadStatus" class="mt-4 text-sm text-center hidden"></div>
                </form>
            </div>
        </section>

        <!-- Right Column: Query -->
        <section class="flex-1">
            <div class="glass-panel rounded-2xl p-6 h-full flex flex-col shadow-2xl transition-transform hover:-translate-y-1 duration-300">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <i class="fas fa-search mr-3 text-blue-400"></i>
                    Query Documents
                </h2>

                <div class="flex-grow flex flex-col bg-slate-800/50 rounded-xl p-4 border border-slate-700 mb-6 h-64 overflow-y-auto" id="chatContainer">
                    <!-- Chat messages will appear here -->
                    <div class="text-center text-slate-500 text-sm mt-auto mb-auto">
                        Ask questions about your uploaded documents.
                    </div>
                </div>

                <form id="queryForm" class="relative">
                    <input type="text" id="question" placeholder="Ask a question..." class="w-full pl-4 pr-14 py-3 bg-slate-800 border border-slate-600 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all placeholder-gray-500" required>
                    <button type="submit" class="absolute right-2 top-1/2 transform -translate-y-1/2 w-10 h-10 bg-gradient-to-br from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 rounded-lg flex items-center justify-center transition-colors">
                        <i class="fas fa-paper-plane text-white"></i>
                    </button>
                </form>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-slate-500 text-sm glass-panel mt-auto">
        &copy; 2024 Doc-Manager. Powered by Node.js & FastAPI.
    </footer>

    <script src="app.js"></script>
</body>
</html>
