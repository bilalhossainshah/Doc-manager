# Ruff configuration for Doc-Manager
# https://docs.astral.sh/ruff/

[lint]
# Rules to enable:
# E/W = pycodestyle errors/warnings
# F   = pyflakes (unused imports, undefined names)
# I   = isort (import sorting)
# N   = pep8-naming conventions
# UP  = pyupgrade (modernise Python syntax)
# B   = flake8-bugbear (likely bugs and design issues)
# A   = flake8-builtins (shadowing builtins)
# C4  = flake8-comprehensions
# SIM = flake8-simplify
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "C4", "SIM"]

# Ignore line-too-long (we let Black handle that)
ignore = ["E501", "B008"]

# Allow unused variables when underscored
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+_*))$"

[lint.per-file-ignores]
# Ignore unused imports in __init__.py files
"__init__.py" = ["F401"]

[format]
# Use double quotes (consistent with Black)
quote-style = "double"
indent-style = "space"
line-ending = "auto"
